name: Dynamic Kaggle Fire-and-Forget Pipeline

on:
  push:
    branches:
      - feat/notebooks
    paths:
      - 'notebooks/*.ipynb' # Triggers only when a notebook file changes
      - '.github/workflows/kaggle-cicd.yml'
      - 'pyproject.toml'

jobs:
  deploy-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required to run git diff against the previous commit

      # Step 1: Set up uv with automatic caching enabled
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'

      # Step 2: Use uv to install Kaggle CLI instantly
      - name: Install Kaggle CLI
        run: uv pip install kaggle

      - name: Configure Kaggle Authentication
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Advanced Intent & Diff Detection
        id: check_intent
        run: |
          # 1. Identify which notebook file was modified/added
          CHANGED_FILE=$(git diff --name-only HEAD^ HEAD | grep '\.ipynb$' | head -n 1)

          if [ -z "$CHANGED_FILE" ]; then
            echo "STATUS=skip" >> $GITHUB_ENV
            echo "No notebook changes found in this commit."
            exit 0
          fi

          echo "Found modified notebook target: $CHANGED_FILE"

          # 2. Extract and evaluate your user-defined TRIGGER_FLAG status
          if grep -q "# TRIGGER_FLAG: run" "$CHANGED_FILE"; then
            echo "Intent Confirmed: Flag is set to RUN."
            echo "STATUS=execute" >> $GITHUB_ENV
            echo "CHANGED_FILE=$CHANGED_FILE" >> $GITHUB_ENV
          elif grep -q "# TRIGGER_FLAG: pause" "$CHANGED_FILE"; then
            echo "Intent Blocked: Flag is set to PAUSE. Skipping remote cloud deployment."
            echo "STATUS=skip" >> $GITHUB_ENV
          else
            echo "Warning: No clean TRIGGER_FLAG found. Defaulting to skip to protect compute limits."
            echo "STATUS=skip" >> $GITHUB_ENV
          fi

      - name: Package and Push Kernel to Kaggle Cloud
        # This guard keeps the step dormant if your check above evaluated to 'skip'
        if: env.STATUS == 'execute'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET_NAME: ${{ secrets.KAGGLE_DATASET_NAME }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "Processing deployment configurations..."

          # INJECT ENV VARS & EXTRACT KAGGLE_CONFIG HEADERS FROM NOTEBOOK
          python -c "
          import json, os, re

          notebook_path = '${{ env.CHANGED_FILE }}'
          with open(notebook_path, 'r', encoding='utf-8') as f:
              data = json.load(f)

          # --- SECTION 1: SECRETS INJECTION ---
          injection_lines = (
              'import os\n'
              f'os.environ[\"DAGSHUB_USERNAME\"] = \"{os.environ[\"DAGSHUB_USERNAME\"]}\"\n'
              f'os.environ[\"DAGSHUB_TOKEN\"] = \"{os.environ[\"DAGSHUB_TOKEN\"]}\"\n'
              f'os.environ[\"KAGGLE_USER\"] = \"{os.environ[\"KAGGLE_USERNAME\"]}\"\n'
              f'os.environ[\"KAGGLE_DATASET_NAME\"] = \"{os.environ[\"KAGGLE_DATASET_NAME\"]}\"\n'
          )
          new_cell = {
              'cell_type': 'code',
              'execution_count': None,
              'metadata': {'jupyter': {'source_hidden': True}}, # Hides the cell from view in public notebooks!
              'outputs': [],
              'source': [injection_lines]
          }
          data['cells'].insert(0, new_cell)

          # --- SECTION 2: CONFIG PARSING ---
          # Combine text content from the first few cells to locate config lines
          raw_text = ''
          for cell in data['cells'][:6]: # Scrapes top cells (including newly added one)
              if cell.get('cell_type') in ['code', 'markdown']:
                  raw_text += '\n' + ''.join(cell.get('source', []))

          def find_config(key, default, is_json=False):
              match = re.search(r'#\s*KAGGLE_CONFIG:\s*' + re.escape(key) + r'\s*=\s*(.*)', raw_text)
              if match:
                  value_str = match.group(1).strip()
                  if is_json:
                      try:
                          # Safely adjust single quotes to double quotes for standard json load
                          return json.loads(ast.literal_eval(value_str).replace(\"'\", '\"'))
                      except Exception as e:
                          print(f'Parsing error for {key}: {e}')
                          return default
                  elif value_str.lower() in ['true', 'false']:
                      return value_str.lower() == 'true'
                  return value_str
              return default

          # Parse configurations or fallback to defaults
          enable_gpu = find_config('enable_gpu', False)
          enable_tpu = find_config('enable_tpu', False)
          keywords = find_config('keywords', [], is_json=True)

          dataset_sources = find_config('dataset_sources', [], is_json=True)
          kernel_sources = find_config('kernel_sources', [], is_json=False)

          # --- SECTION 3: METADATA COMPILED PAYLOAD ---
          filename = os.path.basename(notebook_path).rsplit('.', 1)[0]
          slug = filename.lower().replace(' ', '-').replace('_', '-')

          metadata = {
              'id': f'{os.environ[\"KAGGLE_USERNAME\"]}/{slug}',
              'title': filename,
              'code_file': notebook_path,
              'language': 'python',
              'kernel_type': 'notebook',
              'is_private': True,
              'enable_gpu': enable_gpu,
              'enable_tpu': enable_tpu,
              'enable_internet': True,
              'keywords': keywords,
              'dataset_sources': dataset_sources,
              'kernel_sources': kernel_sources,
              'competition_sources': []
          }

          # Write temporary notebook containing variables
          with open(notebook_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=1)

          # Write dynamically extracted metadata configuration
          with open('kernel-metadata.json', 'w', encoding='utf-8') as f:
              json.dump(metadata, f, indent=2)

          print('Successfully processed secrets, parsed inline notebook configurations, and wrote kernel-metadata.json!')
          "

          echo "Metadata compiled successfully. Initiating cloud sync..."

          echo "---- RAW METADATA GENERATED FOR KAGGLE ----"
          cat kernel-metadata.json
          echo "-------------------------------------------"

          # 3. THE KAGGLE PUSH COMMAND (Triggers remote isolated build)
          kaggle kernels push -p .
