name: ML Training CI

on:
  push:
    branches:
      - feat/ml-training
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ml-training-ci.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ml-training-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -sSL https://astral.sh/uv/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify uv
        run: uv --version

      - name: Sync dependencies (create venv + install)
        run: uv sync --group dev --frozen

      - name: Run linting (ruff)
        run: uv run ruff check src tests

      - name: Run tests (pytest)
        run: uv run pytest -q

      - name: Smoke training test
        run: echo "uv run python -m src.train --sample-run"

      - name: Build Docker image (validation only)
        run: echo "docker build -t ml-training:ci ."
